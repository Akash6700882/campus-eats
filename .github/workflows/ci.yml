name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: campus_eats
          POSTGRES_PASSWORD: campus_eats
          POSTGRES_DB: campus_eats
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U campus_eats"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check app tests

      - name: Type-check (informational)
        run: mypy app --ignore-missing-imports || true

      - name: Run tests
        env:
          SECRET_KEY: ci-test-secret-key
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type-check
        run: npx tsc -b --noEmit

      - name: Lint
        run: npx eslint .

      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npm run build
